<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.L.U.E.-J. | Sovereign Study Guide</title>
    <style>
        :root {
            --bg: #05070A;
            --panel: #0C121D;
            --accent: #00F0FF;
            --border: #1F2937;
            --text: #CBD5E1;
            --glow: rgba(0, 240, 255, 0.15);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 850px;
            padding: 4rem 1.5rem;
        }

        header {
            border-left: 3px solid var(--accent);
            padding-left: 1.5rem;
            margin-bottom: 3rem;
        }

        .brand { font-family: monospace; color: var(--accent); letter-spacing: 0.3em; font-size: 0.8rem; }

        #search { 
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 1rem;
            color: #fff;
            border-radius: 4px;
            margin-bottom: 2rem;
            outline: none;
        }

        #search:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--glow); }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            border-radius: 4px;
            overflow: hidden;
            transition: 0.2s;
        }

        .card-header {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header:hover { background: rgba(255,255,255,0.02); }

        .card-content {
            display: none;
            padding: 0 1.5rem 1.5rem 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        pre {
            background: #000;
            padding: 1rem;
            border-radius: 4px;
            color: var(--accent);
            overflow-x: auto;
        }

        .tag { color: var(--accent); font-family: monospace; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="brand">System.Core.Logs</div>
            <h1>Maestro Migration Guide</h1>
        </header>
        <input type="text" id="search" placeholder="Filter heuristics..." onkeyup="filterCards()">
        <div id="container"></div>
    </div>

    <script>
        const LESSONS = [];

        function render() {
            const container = document.getElementById('container');
            container.innerHTML = LESSONS.map((l, i) => `
                <div class="card" data-title="${l.title.toLowerCase()}">
                    <div class="card-header" onclick="toggle(${i})">
                        <div>
                            <div class="tag">Module ${i+1}</div>
                            <div style="font-weight:bold; font-size:1.2rem; margin-top:4px">${l.title}</div>
                        </div>
                        <span id="icon-${i}">+</span>
                    </div>
                    <div class="card-content" id="content-${i}">${l.body}</div>
                </div>
            `).join('');
        }

        function toggle(i) {
            const el = document.getElementById('content-'+i);
            const icon = document.getElementById('icon-'+i);
            const isVisible = el.style.display === 'block';
            el.style.display = isVisible ? 'none' : 'block';
            icon.innerText = isVisible ? '+' : '-';
        }

        function filterCards() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.title.includes(q) ? 'block' : 'none';
            });
        }
    </script>
</body>

        <div style='color: var(--accent); font-family: monospace; font-weight: bold;'>{ }</div>
        <div><b>Braces:</b> Define Dictionaries (key-to-value maps) or placeholders inside f-strings.</div>
        
        <div style='color: var(--accent); font-family: monospace; font-weight: bold;'>:</div>
        <div><b>Colon:</b> Signals the start of a code block (like an <code>if</code> statement or a <code>def</code>).</div>
